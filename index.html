<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebSwan E-Signature Agreement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: white; color: #14395d; line-height: 1.6; min-height: 100vh; }
        .main-wrapper { background-color: #14395d; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); overflow: hidden; display: flex; flex-direction: column; min-height: 95vh; }
        header { background: #14395d; color: #1DF1F1; padding: 25px; text-align: center; }
        .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .logo i { font-size: 36px; margin-right: 15px; color: #1DF1F1; }
        h1 { font-size: 28px; color: #1DF1F1; }
        .content-wrapper { display: flex; flex-direction: column; flex-grow: 1; padding: 20px; overflow-y: auto; }
        .form-section { padding: 20px; }
        .form-section h2 { color: #14395d; border-bottom: 2px solid #14395d; padding-bottom: 10px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 25px; }
        label { display: block; margin-bottom: 8px; color: #14395d; }
        input[type="text"], input[type="email"] { width: 100%; padding: 12px; border: 2px solid #ccc; border-radius: 5px; background-color: #e1e9f0; color: #073766; border-style: inset; }
        
        .signature-section { padding: 20px; text-align: center; background: #f9f9f9; border-top: 1px solid #ccc; }
        #signature-pad-container { border: 2px dashed #95a5a6; border-radius: 5px; margin-top: 10px; height: 200px; background: white; touch-action: none; }
        #signature-pad { width: 100%; height: 100%; cursor: crosshair; display: block; }

        .btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; margin: 5px; }
        .btn-primary { background-color: #14395d; color: white; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-sms { background: #25D366; color: white; }
        .btn-email { background: #14395d; color: white; border: 1px solid #1DF1F1; }

        .acknowledgement-label { display: flex; align-items: flex-start; text-align: left; margin-bottom: 10px; gap: 10px; }
        .acknowledgement-label input { width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; }

        .sms-section { background: #f0f9ff; padding: 15px; border-radius: 8px; margin: 20px auto; border: 2px dashed #14395d; }
        footer { text-align: center; padding: 20px; background-color: #f1f1f1; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        
        @media (max-width: 600px) { .btn { width: 100%; } }

        /* Ensure canvas stays interactive during print/save */
        @media print {
            #signature-pad {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .btn, .sms-section, .modal, .btn-row {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <header>
                <div class="logo"><i class="fas fa-feather-alt"></i><h1>WebSwan E-Signature Agreement</h1></div>
                <p>Please provide your information and sign below</p>
            </header>

            <div class="content-wrapper">
                <main>
                    <div class="form-section">
                        <h2>Client Information</h2>
                        <form id="client-info-form">
                            <div class="form-grid">
                                <div class="form-group"><label>Full Name</label><input type="text" name="Full Name" placeholder="Enter your name"></div>
                                <div class="form-group"><label>Company</label><input type="text" name="Company Name" placeholder="Optional"></div>
                                <div class="form-group"><label>Phone</label><input type="text" id="phone-number" name="Phone Number" placeholder="Optional"></div>
                                <div class="form-group"><label>Email</label><input type="email" id="email-address" name="Email Address" placeholder="Optional"></div>
                            </div>
                        </form>
                    </div>

                    <div class="signature-section">
                        <div class="acknowledgement-label">
                            <input type="checkbox" id="agreeCheckbox">
                            <p>I acknowledge and agree to the General Terms and Conditions above.</p>
                        </div>

                        <div id="signature-pad-container">
                            <canvas id="signature-pad"></canvas>
                        </div>

                        <div class="signature-controls" style="margin-top:15px;">
                            <button type="button" class="btn btn-secondary" id="clear-btn">Clear</button>
                            <button type="button" class="btn btn-primary" id="submit-btn">Submit Agreement</button>
                            <button type="button" class="btn btn-success" id="print-btn">Print / Save PDF</button>
                        </div>

                        <div class="sms-section">
                            <h3>Share via:</h3>
                            <button onclick="showSMSModal()" class="btn btn-sms">SMS</button>
                            <button onclick="shareViaEmail()" class="btn btn-email">Email</button>
                        </div>
                    </div>
                </main>
            </div>
            <footer>
                <p>&copy; 2024 The Web Swan</p>
            </footer>
        </div>
    </div>

    <div id="smsModal" class="modal">
        <div class="modal-content">
            <h3>Send via SMS</h3>
            <input type="tel" id="smsPhoneNumber" placeholder="+1234567890" style="width:100%; padding:10px; margin:10px 0;">
            <button onclick="sendSMS()" class="btn btn-sms">Send</button>
            <button onclick="closeSMSModal()" class="btn btn-secondary">Cancel</button>
        </div>
    </div>

    <script>
        // ===== SIGNATURE PAD SETUP - ALWAYS LIVE =====
        const signaturePad = document.getElementById('signature-pad');
        const agreeCheckbox = document.getElementById('agreeCheckbox');
        const clearBtn = document.getElementById('clear-btn');
        const ctx = signaturePad.getContext('2d');
        let isDrawing = false;

        // Initialize canvas with proper dimensions
        function resizeCanvas() {
            const container = document.getElementById('signature-pad-container');
            const rect = container.getBoundingClientRect();
            signaturePad.width = rect.width;
            signaturePad.height = rect.height;
            ctx.strokeStyle = '#14395d';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        // DRAWING EVENTS - ALWAYS ENABLED (no checkbox required)
        signaturePad.addEventListener('mousedown', startDrawing);
        signaturePad.addEventListener('mousemove', draw);
        signaturePad.addEventListener('mouseup', stopDrawing);
        signaturePad.addEventListener('mouseleave', stopDrawing);

        // Touch support for mobile
        signaturePad.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = signaturePad.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        signaturePad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = signaturePad.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
        });

        signaturePad.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
        });

        function startDrawing(e) {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // CLEAR BUTTON - Always works
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, signaturePad.width, signaturePad.height);
        });

        // SUBMIT BUTTON - Just shows alert, doesn't disable anything
        document.getElementById('submit-btn').addEventListener('click', function() {
            alert('Agreement recorded (demo). All fields are optional.');
        });

        // PRINT/PDF BUTTON - Signature pad stays LIVE during print
        document.getElementById('print-btn').addEventListener('click', function() {
            window.print();
        });

        // ===== MODAL FUNCTIONS =====
        function showSMSModal() { 
            document.getElementById('smsModal').classList.add('active'); 
        }
        
        function closeSMSModal() { 
            document.getElementById('smsModal').classList.remove('active'); 
        }

        function sendSMS() {
            const phone = document.getElementById('smsPhoneNumber').value;
            if (phone) {
                window.location.href = `sms:${phone}?body=${encodeURIComponent(window.location.href)}`;
            }
            closeSMSModal();
        }

        function shareViaEmail() {
            window.location.href = `mailto:?subject=Agreement&body=${encodeURIComponent(window.location.href)}`;
        }

        // Close modal when clicking outside
        window.addEventListener('click', function(e) {
            const modal = document.getElementById('smsModal');
            if (e.target === modal) {
                closeSMSModal();
            }
        });

        // Ensure canvas stays interactive
        setInterval(() => {
            // Small hack to keep canvas context alive
            if (ctx) {
                ctx.strokeStyle = '#14395d';
                ctx.lineWidth = 2;
            }
        }, 1000);
    </script>
</body>
</html>
